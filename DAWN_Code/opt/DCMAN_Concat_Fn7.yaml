Proj_name: DCMAN_Concat_DATA0930_FIXED
Random_seed: 2

### Network Architecture
Input_frame_num: 7      # Numbers of Frames in a video (sliding window)
Network_name: "DCMAN"
Channel_merge: "concat"

### Network Training Process
Epoch_size: 500       # Number of batches in an epoch
Batch_size: 10         # Number of video in a mini-batch
LR: 0.0001
Iter_num: 40           # Number of Iterations (Net trained with an epoch)

### Simulation
Img_size: [120, 120]
Simulation_dsample: [1, 2]

### Loss function
Loss: 
  name: L2_Weighted
  params:
    gamma: 1


### Dataset Definition
Dataset:
  train:
    - path: /data/datasets/cyx_aligned_datasets/20220930_HJ_HS_6.7_FIXED/train/
      layer: 1
      weight: 1
      type: .tif
  test:
    - path: /data/datasets/cyx_aligned_datasets/20220930_HJ_HS_6.7_FIXED/test/
      layer: 1
      weight: 1
      type: .tif

