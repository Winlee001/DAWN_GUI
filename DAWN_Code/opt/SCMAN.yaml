Proj_name: SCMAN
Random_seed: 2

### Network Architecture
Input_frame_num: 7      # Numbers of Frames in a video (sliding window)
Network_name: "SCMAN"
# Channel_merge: "concat"

### Network Training Process
Epoch_size: 500       # Number of batches in an epoch
Batch_size: 10         # Number of video in a mini-batch
LR: 0.0001
Iter_num: 40           # Number of Iterations (Net trained with an epoch)

### Simulation
Img_size: [120, 120]
Simulation_dsample: [1, 2]
Noise_model:
  Name: CMOS
  Parameters:
    # for CMOS model
    rgb_kc: [10, 40]
    lower_kc_milestones: []
    lower_kc_ratios: []

    kc_nir_to_rgb: [0.5, 1.5]
    nd: [2, 10]
    sigma_beta: [0.02, 0.08]
    sigma_r: [0.9,1.1]

    # for AWGN model
    rgb_sigma: [20, 80]
    nir_sigma: [20, 80]

### Loss function
Loss: "ColorLoss"
Color_loss_milestones: [0, 20, 30]
Color_loss_ratio: [0.1, 0.25, 0.6]  # same length with Color_loss_milestones


### Dataset Definition
Dataset:
  train:
    - path: /data/datasets/cyx_aligned_datasets/20220722_4CH/train/
      layer: 1
      weight: 1
      type: .tif
  test:
    - path: /data/datasets/cyx_aligned_datasets/20220722_4CH/test/
      layer: 1
      weight: 1
      type: .tif

